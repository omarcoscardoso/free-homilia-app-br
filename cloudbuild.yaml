steps:
  # 1. Constrói a imagem Docker a partir do Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/homilia-app-repo/free-homilia-app-br:$COMMIT_SHA', '.']

  # 2. Envia a imagem para o Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/homilia-app-repo/free-homilia-app-br:$COMMIT_SHA']

  # 3. Faz o deploy da imagem no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'free-homilia-app-br'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/homilia-app-repo/free-homilia-app-br:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
